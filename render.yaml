databases:
  - name: susu-collection-db
    plan: basic-256mb
    databaseName: susu_collection
    user: susu_collection_user

services:
  - type: web
    name: susu-collection-portal
    runtime: python
    plan: starter
    branch: main
    buildCommand: pip install -r mail-api/requirements.txt && npm ci && npm run build && rm -rf mail-api/public && cp -R dist mail-api/public
    startCommand: cd mail-api && gunicorn app:app --workers 2 --threads 4 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: susu-collection-db
          property: connectionString
      - key: VITE_MAIL_API_URL
        value: /api
      - key: PORTAL_PUBLIC_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TRUST_PROXY_HEADERS
        value: true
      - key: PORTAL_REQUIRE_DATABASE
        value: true
      - key: MONITORING_ENVIRONMENT
        value: production
      - key: MONITORING_ALERT_WEBHOOK_URL
        sync: false
      - key: MONITORING_ALERT_EMAIL
        sync: false
      - key: SMS_WEBHOOK_URL
        sync: false
      - key: SMS_WEBHOOK_API_KEY
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: 465
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: PORTAL_DEFAULT_INITIAL_PASSWORD
        sync: false
